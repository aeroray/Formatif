<svg viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="gradSunset" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="55%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gradProduct" x1="0" y1="1" x2="0.9" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gradReel" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="gradSpinner" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f0f6"/>
    </linearGradient>
    <filter id="frameShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="36" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <g id="check">
      <circle r="21" fill="#10b981"/>
      <path d="M -9,0 L -3,7 L 10,-9" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </defs>

  <g filter="url(#frameShadow)">
    <rect x="10" y="10" width="880" height="740" rx="20" fill="#0d0d12"/>
    <rect x="10.5" y="10.5" width="879" height="739" rx="19.5" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>

  <!-- title bar -->
  <line x1="10" y1="66" x2="890" y2="66" stroke="#ffffff" stroke-opacity="0.08"/>
  <g transform="translate(30,21)">
    <rect width="28" height="28" rx="7" fill="#9362f4"/>
    <g transform="translate(4.4,4.4) scale(0.096)">
      <path d="M 73,50 L 122.5,50 A 12.5,12.5 0 0,1 122.5,75 L 95,75 L 95,84 Q 95,90 101,90 L 102.5,90 A 12.5,12.5 0 0,1 102.5,115 L 95,115 L 95,142 Q 95,150 87,150 L 73,150 Q 65,150 65,142 L 65,58 Q 65,50 73,50 Z" fill="url(#logoGrad)"/>
    </g>
  </g>
  <text x="70" y="40" fill="#f5f5f5" font-size="15" font-weight="600">Formatif</text>

  <g transform="translate(858,35)" stroke="#9d9da6" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
    <circle r="3.2"/>
    <path d="M0,-8 L0,-6 M0,6 L0,8 M-8,0 L-6,0 M6,0 L8,0 M-5.6,-5.6 L-4.2,-4.2 M4.2,4.2 L5.6,5.6 M-5.6,5.6 L-4.2,4.2 M4.2,-4.2 L5.6,-5.6"/>
  </g>

  <!-- add more tile -->
  <g transform="translate(34,90)">
    <rect width="261" height="261" rx="18" fill="#17171c"/>
    <rect x="0.75" y="0.75" width="259.5" height="259.5" rx="17.5" fill="none" stroke="#9362f4" stroke-opacity="0.45" stroke-width="1.5" stroke-dasharray="7 7"/>
    <circle cx="130.5" cy="112" r="20" fill="#9362f4" fill-opacity="0.18"/>
    <path d="M 130.5,101 L 130.5,123 M 119.5,112 L 141.5,112" stroke="#9362f4" stroke-width="3" stroke-linecap="round"/>
    <text x="130.5" y="152" fill="#9362f4" font-size="14" font-weight="600" text-anchor="middle">Add more files</text>
  </g>

  <!-- card: sunset-beach.jpg -->
  <g transform="translate(319,90)">
    <rect width="261" height="261" rx="18" fill="url(#gradSunset)" filter="url(#cardShadow)"/>
    <rect width="261" height="261" rx="18" fill="url(#fadeBottom)"/>
    <rect x="10" y="10" width="52" height="23" rx="6" fill="#10b981" fill-opacity="0.92"/>
    <text x="36" y="26" fill="#ffffff" font-size="12.5" font-weight="700" text-anchor="middle">&#8722;76%</text>
    <use href="#check" x="130.5" y="130.5"/>
    <text x="14" y="240" font-size="13" font-weight="600"><tspan fill="#ffffff">4.6 MB </tspan><tspan fill="#34d399">&#8594; 1.1 MB</tspan></text>
  </g>

  <!-- card: product-shot.png -->
  <g transform="translate(604,90)">
    <rect width="261" height="261" rx="18" fill="url(#gradProduct)" filter="url(#cardShadow)"/>
    <rect width="261" height="261" rx="18" fill="url(#fadeBottom)"/>
    <rect x="10" y="10" width="52" height="23" rx="6" fill="#10b981" fill-opacity="0.92"/>
    <text x="36" y="26" fill="#ffffff" font-size="12.5" font-weight="700" text-anchor="middle">&#8722;70%</text>
    <use href="#check" x="130.5" y="130.5"/>
    <text x="14" y="240" font-size="13" font-weight="600"><tspan fill="#ffffff">2.0 MB </tspan><tspan fill="#34d399">&#8594; 625 KB</tspan></text>
  </g>

  <!-- card: demo-reel.mp4 -->
  <g transform="translate(34,375)">
    <rect width="261" height="261" rx="18" fill="url(#gradReel)" filter="url(#cardShadow)"/>
    <rect width="261" height="261" rx="18" fill="url(#fadeBottom)"/>
    <rect x="10" y="10" width="52" height="23" rx="6" fill="#10b981" fill-opacity="0.92"/>
    <text x="36" y="26" fill="#ffffff" font-size="12.5" font-weight="700" text-anchor="middle">&#8722;67%</text>
    <use href="#check" x="130.5" y="130.5"/>
    <text x="14" y="240" font-size="13" font-weight="600"><tspan fill="#ffffff">128 MB </tspan><tspan fill="#34d399">&#8594; 42.0 MB</tspan></text>
  </g>

  <!-- card: loading-spinner.gif -->
  <g transform="translate(319,375)">
    <rect width="261" height="261" rx="18" fill="url(#gradSpinner)" filter="url(#cardShadow)"/>
    <rect width="261" height="261" rx="18" fill="url(#fadeBottom)"/>
    <rect x="10" y="10" width="52" height="23" rx="6" fill="#10b981" fill-opacity="0.92"/>
    <text x="36" y="26" fill="#ffffff" font-size="12.5" font-weight="700" text-anchor="middle">&#8722;87%</text>
    <use href="#check" x="130.5" y="130.5"/>
    <text x="14" y="240" font-size="13" font-weight="600"><tspan fill="#ffffff">3.4 MB </tspan><tspan fill="#34d399">&#8594; 470 KB</tspan></text>
  </g>

  <!-- card: invoice-report.pdf (icon fallback, no thumbnail) -->
  <g transform="translate(604,375)">
    <rect width="261" height="261" rx="18" fill="#222227" filter="url(#cardShadow)"/>
    <g transform="translate(130.5,130.5)" opacity="0.35">
      <path d="M -22,-30 L 8,-30 L 22,-16 L 22,30 L -22,30 Z" fill="none" stroke="#9d9da6" stroke-width="3" stroke-linejoin="round"/>
      <path d="M 8,-30 L 8,-16 L 22,-16" fill="none" stroke="#9d9da6" stroke-width="3" stroke-linejoin="round"/>
    </g>
    <rect x="10" y="10" width="52" height="23" rx="6" fill="#10b981" fill-opacity="0.92"/>
    <text x="36" y="26" fill="#ffffff" font-size="12.5" font-weight="700" text-anchor="middle">&#8722;75%</text>
    <rect width="261" height="261" rx="18" fill="url(#fadeBottom)"/>
    <text x="14" y="240" font-size="13" font-weight="600"><tspan fill="#ffffff">8.2 MB </tspan><tspan fill="#34d399">&#8594; 2.1 MB</tspan></text>
  </g>

  <!-- bottom bar -->
  <line x1="10" y1="660" x2="890" y2="660" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="34" y="710" fill="#9d9da6" font-size="14">Compressed 5 files &#183; Saved 100 MB (&#8722;68%) &#183; Spent 15.4s</text>

  <rect x="706" y="688" width="68" height="34" rx="8" fill="#222227"/>
  <text x="740" y="710" fill="#f5f5f5" font-size="13" font-weight="600" text-anchor="middle">Clear</text>

  <rect x="786" y="688" width="90" height="34" rx="8" fill="#9362f4"/>
  <text x="831" y="710" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Compress</text>
</svg>
