name: Release

# Push a version tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`) to build
# Windows + macOS installers and attach them to a new (draft) GitHub Release.
# Bump package.json's "version" to match before tagging — tauri.conf.json
# reads its version from there, so the tag and the built app should agree.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        # Apple Silicon only — no Intel Mac build (see stage-tools-macos.sh;
        # Homebrew has no official prebuilt binaries for qpdf/gifsicle on any
        # platform, and getting an x86_64 copy too would need a Rosetta-
        # assisted dual Homebrew install on the arm64 runner).
        platform: [windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    # Safety net: without this, a genuine hang (e.g. a tool prompting on
    # stdin in a non-interactive shell) burns CI minutes for hours before
    # GitHub's own 6h default ceiling kicks in. A clean run finishes in
    # ~15 min; anything past 30 is broken, not just slow.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # Stage ffmpeg/qpdf/gifsicle into src-tauri/tools-staging/ so Tauri
      # bundles them (see tauri.conf.json's "resources") — nothing is
      # downloaded by the app itself at runtime anymore.
      - name: Stage tools (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: ./scripts/stage-tools-windows.ps1

      - name: Stage tools (macOS)
        if: matrix.platform == 'macos-latest'
        run: bash scripts/stage-tools-macos.sh

      # No Apple Developer certificate yet, so macOS output is unsigned (fine
      # to build and distribute, just shows an "unidentified developer"
      # Gatekeeper prompt on first launch). To sign once you have one, add
      # APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
      # / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID as repo secrets and pass
      # them through here as env vars — but only when they're actually set:
      # tauri-bundler treats a *present-but-empty* APPLE_CERTIFICATE env var
      # as "try to sign with this", not "skip signing", so referencing an
      # unset secret directly (e.g. `${{ secrets.APPLE_CERTIFICATE }}`) breaks
      # the build rather than no-op'ing.
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Formatif ${{ github.ref_name }}"
          # Prepended to the auto-generated notes below. Remove once macOS
          # builds are code-signed (see the comment above this step).
          releaseBody: |
            ## macOS: first launch

            This build isn't code-signed yet, so Gatekeeper blocks it on first launch. After moving `Formatif.app` to `/Applications`, either right-click it → **Open** → confirm, or run once in Terminal:

            ```sh
            xattr -rd com.apple.quarantine /Applications/Formatif.app
            ```
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: false
